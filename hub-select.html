<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container { width: 100%; max-width: 500px; animation: fadeUp 0.8s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-wrap { text-align: center; margin-bottom: 40px; }
  .logo-img { width: 120px; }
  .logo-sub { font-size: 10px; font-weight: 500; letter-spacing: 5px; text-transform: uppercase; color: #b5a06a; margin-top: 10px; }
  h2 { color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; text-align: center; margin-bottom: 24px; }
  .dash-grid { display: flex; flex-direction: column; gap: 12px; }
  .dash-card {
    display: block; padding: 24px 28px;
    background: #3d3d38;
    border: 1px solid rgba(181,160,106,0.2);
    border-radius: 2px;
    text-decoration: none;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .dash-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(to right, transparent, #b5a06a, transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .dash-card:hover { background: #4a4a45; border-color: rgba(181,160,106,0.5); }
  .dash-card:hover::before { opacity: 1; }
  .dash-name { font-size: 15px; font-weight: 500; color: #f5f0e8; margin-bottom: 4px; }
  .dash-desc { font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px; }
  .dash-arrow { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); color: #b5a06a; font-size: 18px; }
</style>
